<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A;
    --bg2: #111111;
    --card: #161616;

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Tweaks ──────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

  "heroLayout": "split",

}/*EDITMODE-END*/;

// ── Reveal hook ──────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

// ── Pill Tag ─────────────────────────────────────────────
const Tag = ({ children, dark }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: '5px 14px', borderRadius: 999,
    background: dark ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.1)',
    border: '1px solid rgba(255,255,255,0.15)',
    fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
    textTransform: 'uppercase', color: 'rgba(255,255,255,0.8)',
    backdropFilter: 'blur(8px)',
  }}>{children}</span>
);

// ── Pill Button ───────────────────────────────────────────
const Btn = ({ children, primary, outline, onClick, href, small }) => {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 8,
    padding: small ? '10px 22px' : '14px 32px',
    borderRadius: 999, cursor: 'pointer', fontFamily: 'Inter, sans-serif',
    fontWeight: 600, fontSize: small ? 13 : 15, textDecoration: 'none',
    transition: 'all 0.25s ease', userSelect: 'none', whiteSpace: 'nowrap',
  };
  const styles = primary
    ? { ...base, background: '#fff', color: '#000', border: '1.5px solid #fff' }
    : outline
    ? { ...base, background: 'transparent', color: '#fff', border: '1.5px solid rgba(255,255,255,0.4)' }
    : { ...base, background: 'rgba(255,255,255,0.07)', color: '#fff', border: '1.5px solid rgba(255,255,255,0.15)' };
  const [hov, setHov] = useState(false);
  const hovStyle = primary
    ? { background: '#e8e8e8', transform: 'translateY(-1px)', boxShadow: '0 8px 24px rgba(255,255,255,0.15)' }
    : outline
    ? { background: 'rgba(255,255,255,0.08)', transform: 'translateY(-1px)' }
    : { background: 'rgba(255,255,255,0.12)', transform: 'translateY(-1px)' };
  const el = href ? 'a' : 'button';
  return React.createElement(el, {
    href, onClick,
    style: hov ? { ...styles, ...hovStyle } : styles,
    onMouseEnter: () => setHov(true),
    onMouseLeave: () => setHov(false),
  }, children);
};

// ── Phone Mockup ──────────────────────────────────────────

// ── Services Card ─────────────────────────────────────────

// ── Video Card ────────────────────────────────────────────
const VideoCard = ({ src }) => {
  const videoRef = useRef(null);
  const [hov, setHov] = useState(false);

  useEffect(() => {
    if (videoRef.current && src) {
      videoRef.current.play().catch(() => {});
    }
  }, [src]);

  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        aspectRatio:'9/16', borderRadius:16, overflow:'hidden',
        background:'#111', border:'1px solid rgba(255,255,255,0.07)',
        position:'relative', cursor:'pointer',
        transform: hov ? 'scale(1.03)' : 'scale(1)',
        transition:'transform 0.35s ease, box-shadow 0.35s ease',
        boxShadow: hov ? '0 24px 60px rgba(0,0,0,0.7)' : '0 4px 20px rgba(0,0,0,0.4)',

      {!src && <>
        <div style={{ position:'absolute', inset:0, backgroundImage:'repeating-linear-gradient(45deg, #151515 0px, #151515 3px, #0F0F0F 3px, #0F0F0F 10px)' }} />
        <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12 }}>
          <div style={{ width:48, height:48, borderRadius:'50%', border:'1.5px solid rgba(255,255,255,0.25)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ width:0, height:0, borderTop:'9px solid transparent', borderBottom:'9px solid transparent', borderLeft:'15px solid rgba(255,255,255,0.6)', marginLeft:3 }} />
          </div>
          <span style={{ fontSize:10, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', color:'rgba(255,255,255,0.25)', fontFamily:'monospace' }}>9:16</span>
        </div>
      </>}
      {src && <video ref={videoRef} autoPlay loop muted playsInline src={src}
        style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }}
      />}
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  useReveal();

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const clients = ['Le Petit Bistro', 'Fusion 360', 'Brasserie Nord', 'Casa Roma', 'Le Comptoir', 'Sushi Palace', 'La Table Verte', 'Urban Grill', 'Pâtisserie Blanc', 'Maison Dorée'];

    <div style={{ minHeight:'100vh', background:'#0A0A0A' }}>

      {/* ── BANNER ───────────────────────────────────────── */}

        <div style={{ background:'#fff', color:'#000', padding:'9px 24px', display:'flex', alignItems:'center', justifyContent:'center', gap:16, fontSize:13, fontWeight:500, flexWrap:'wrap' }}>
          <span>🎁 <strong>Offre spéciale</strong> — Premier mois offert sur l'accompagnement restaurateur</span>
          <button onClick={() => {}} style={{ padding:'5px 16px', borderRadius:999, background:'#000', color:'#fff', border:'none', fontSize:12, fontWeight:700, cursor:'pointer', letterSpacing:'0.04em' }}>J'en profite →</button>
        </div>
      )}

      {/* ── NAV ──────────────────────────────────────────── */}

        position:'sticky', top:0, zIndex:100,
        background: scrolled ? 'rgba(10,10,10,0.85)' : 'transparent',
        backdropFilter: scrolled ? 'blur(20px)' : 'none',
        borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent',
        transition:'all 0.4s ease',
        padding:'0 40px', height:68,
        display:'flex', alignItems:'center', justifyContent:'space-between',
      }}>
        <div style={{ fontFamily:'Archivo, sans-serif', fontWeight:900, fontStyle:'italic', fontSize:20, letterSpacing:'-0.01em' }}>NAYRO AGENCY</div>
        <div style={{ display:'flex', gap:36, fontSize:13, fontWeight:500, color:'rgba(255,255,255,0.65)' }}>
          {['Services','Portfolio','Clients','Contact'].map(item => (
            <a key={item} href={`#${item.toLowerCase()}`} style={{ textDecoration:'none', color:'inherit', transition:'color 0.2s', letterSpacing:'0.04em' }}

          ))}
        </div>
        <Btn primary small>{tweaks.ctaText}</Btn>
      </nav>

      {/* ── HERO ─────────────────────────────────────────── */}
      <section data-screen-label="01 Hero" style={{ minHeight:'100vh', display:'flex', alignItems:'center', padding:'80px 40px 100px', maxWidth:1280, margin:'0 auto', gap:80 }}>
        {/* Left */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:28 }}>
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', animation:'fadeUp 0.6s ease both' }}>
