<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0A0A0A;
    --bg2: #111111;
    --card: #161616;
    --card2: #1E1E1E;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.45);
    --muted2: rgba(255,255,255,0.65);
  }
  @keyframes heavyDrop {
    0%   { opacity: 0; transform: scale(1.8) translateY(-20px); }
    70%  { opacity: 1; transform: scale(0.9) translateY(3px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .star-anim {
    display: inline-block;
    opacity: 0;
    animation: heavyDrop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  /* ── ROCKET ─────────────────────────────────────────── */
  @keyframes rocketBounce {
    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-4px); }
  }
  .rocket-icon {
    display: inline-block;
    animation: rocketBounce 1.2s ease-in-out infinite;
    will-change: transform;
  }

  @keyframes levitate {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }
  @keyframes levitate-shadow {
    0%   { box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1.5px rgba(255,255,255,0.15); }
    50%  { box-shadow: 0 12px 24px rgba(0,0,0,0.6), 0 0 0 1.5px rgba(255,255,255,0.15); }
    100% { box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1.5px rgba(255,255,255,0.15); }
  }

  html { scroll-behavior: smooth; }

  /* ── CURSOR GLOW ───────────────────────────────────── */
  #cursor-glow {
    position: fixed;
    top: 0; left: 0;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,255,255,0.50) 0%,
      rgba(255,255,255,0.10) 30%,
      transparent 70%);
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
    filter: blur(40px);
    will-change: transform;
  }
  @media (max-width: 768px), (pointer: coarse) {
    #cursor-glow { display: none !important; }
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }
  ::selection { background: #fff; color: #000; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* ── RESPONSIVE ──────────────────────────────────────── */
  html, body { overflow-x: hidden; max-width: 100vw; }
  img, video { max-width: 100%; }

  /* Nav */
  .nav-links { display: flex; gap: 36px; }
  .nav-cta   { display: flex; }
  .nav-burger { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: #fff; }

  /* Hero */
  .hero-section { flex-direction: row; }
  .hero-phone   { display: flex; }

  /* Stats */
  .stats-row { display: flex; flex-direction: row; }
  .stat-item { border-right-width: 1px; }

  /* Grids */
  .grid-3  { grid-template-columns: repeat(3,1fr); }
  .grid-2  { grid-template-columns: 1fr 1fr; }

  /* Process */
  .process-grid { grid-template-columns: 1fr 1fr; }
  .process-visual { display: flex; }

  /* Client names */
  .client-names { gap: 80px; }

  /* CTA box */
  .cta-box { padding: 80px 80px; }
  .cta-btns { flex-direction: row; }

  /* Footer */
  .footer-inner { flex-direction: row; }

  /* ── TABLET (≤ 768px) */
  @media (max-width: 768px) {
    .nav-links  { display: none; }
    .nav-cta    { display: none; }
    .nav-burger { display: flex; align-items: center; justify-content: center; }

    .hero-section { flex-direction: column; padding: 60px 20px 80px; gap: 48px; min-height: auto; }
    .hero-phone   { display: none; }

    .stats-row  { flex-direction: column; }
    .stat-item  { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .stat-item:last-child { border-bottom: none; }

    .grid-3    { grid-template-columns: 1fr; }
    .grid-2    { grid-template-columns: 1fr; }

    .process-grid   { grid-template-columns: 1fr; gap: 40px; }
    .process-visual { display: none; }

    .client-names { gap: 32px; flex-wrap: wrap; justify-content: center; }

    .section-pad { padding: 80px 20px; }

    .cta-box  { padding: 48px 24px; }
    .cta-btns { flex-direction: column; align-items: stretch; }
    .cta-btns button, .cta-btns a { width: 100%; justify-content: center; }

    .footer-inner { flex-direction: column; align-items: flex-start; gap: 20px; }
    .footer-links { flex-wrap: wrap; gap: 16px; }
  }

  /* ── MOBILE (≤ 480px) */
  @media (max-width: 480px) {
    .hero-section { padding: 48px 16px 64px; }
    .section-pad  { padding: 64px 16px; }
    .cta-box      { padding: 40px 20px; border-radius: 20px; }
    .client-names { gap: 24px; }
    nav           { padding: 0 20px !important; }
  }

  /* Mobile menu overlay */
  .mobile-menu {
    display: none;
    position: fixed; inset: 0; top: 68px; z-index: 99;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(20px);
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 36px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    font-family: 'Archivo', sans-serif; font-weight: 900; font-style: italic;
    font-size: 32px; text-transform: uppercase; text-decoration: none; color: #fff;
    letter-spacing: -0.01em;
  }

  /* ── CURSOR GLOW ─────────────────────────────────────── */
  #cursor-glow {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 320px; height: 320px;
    margin: -160px 0 0 -160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 40%, transparent 70%);
    filter: blur(40px);
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 1;
    transition: transform 0.12s ease-out;
    will-change: transform;
  }
  @media (hover: hover) and (pointer: fine) {
    #cursor-glow { display: block; }
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }
</style>
</head>

<div id="cursor-glow"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var glow = document.getElementById('cursor-glow');
  if (!glow) return;
  document.addEventListener('mousemove', function(e) {
    glow.style.transform = 'translate(' + e.clientX + 'px, ' + e.clientY + 'px) translate(-50%, -50%)';
  });
});
</script>
<script>
  (function() {
    const glow = document.getElementById('cursor-glow');
    let tx = 0, ty = 0, cx = 0, cy = 0;
    window.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
    function animate() {
      cx += (tx - cx) * 0.1;
      cy += (ty - cy) * 0.1;
      glow.style.transform = `translate(${cx}px, ${cy}px)`;
      requestAnimationFrame(animate);
    }
    animate();
  })();
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Tweaks ──────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "bannerVisible": false,
  "heroLayout": "split",
  "statsStyle": "large",
  "ctaText": "Nous contacter"
}/*EDITMODE-END*/;

// ── Reveal hook ──────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

// ── Pill Tag ─────────────────────────────────────────────
const Tag = ({ children, dark }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: '5px 14px', borderRadius: 999,
    background: dark ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.1)',
    border: '1px solid rgba(255,255,255,0.15)',
    fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
    textTransform: 'uppercase', color: 'rgba(255,255,255,0.8)',
    backdropFilter: 'blur(8px)',
  }}>{children}</span>
);

// ── Pill Button ───────────────────────────────────────────
const Btn = ({ children, primary, outline, onClick, href, small }) => {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 8,
    padding: small ? '10px 22px' : '14px 32px',
    borderRadius: 999, cursor: 'pointer', fontFamily: 'Inter, sans-serif',
    fontWeight: 600, fontSize: small ? 13 : 15, textDecoration: 'none',
    transition: 'all 0.25s ease', userSelect: 'none', whiteSpace: 'nowrap',
  };
  const styles = primary
    ? { ...base, background: '#fff', color: '#000', border: '1.5px solid #fff' }
    : outline
    ? { ...base, background: 'transparent', color: '#fff', border: '1.5px solid rgba(255,255,255,0.4)' }
    : { ...base, background: 'rgba(255,255,255,0.07)', color: '#fff', border: '1.5px solid rgba(255,255,255,0.15)' };
  const [hov, setHov] = useState(false);
  const hovStyle = primary
    ? { background: '#e8e8e8', transform: 'translateY(-1px)', boxShadow: '0 8px 24px rgba(255,255,255,0.15)' }
    : outline
    ? { background: 'rgba(255,255,255,0.08)', transform: 'translateY(-1px)' }
    : { background: 'rgba(255,255,255,0.12)', transform: 'translateY(-1px)' };
  const el = href ? 'a' : 'button';
  return React.createElement(el, {
    href, onClick,
    style: hov ? { ...styles, ...hovStyle } : styles,
    onMouseEnter: () => setHov(true),
    onMouseLeave: () => setHov(false),
  }, children);
};

    fontSize: 12, fontWeight: 600, color: '#fff',
    display: 'flex', alignItems: 'center', gap: 8,
    boxShadow: '0 16px 40px rgba(0,0,0,0.6)',
    animation: 'float 4s ease-in-out infinite',
    whiteSpace: 'nowrap',
    ...style,
  }}>{children}</div>
);

    </div>
    {/* Floating badges */}
    <FloatBadge style={{ top: 40, right: -70, animationDelay:'0s' }}>

    </FloatBadge>
    <FloatBadge style={{ bottom: 60, right: -65, animationDelay:'0.6s' }}>

// ── Services Card ─────────────────────────────────────────
